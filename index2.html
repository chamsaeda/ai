<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학급 출석 관리 & 발표자 선정</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --green: #2ecc71;
            --yellow: #f1c40f;
            --red: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --blue: #3498db;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        header {
            background: var(--dark);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        header h1 { font-size: 1.8rem; }
        .header-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .btn {
            padding: 0.7rem 1.4rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; transform: scale(1.03); }
        .btn:active { transform: scale(0.97); }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-green { background: var(--green); color: #fff; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-yellow { background: var(--yellow); color: #333; }
        .btn-dark { background: #555; color: #fff; }

        .container { display: flex; gap: 1.5rem; padding: 1.5rem; flex-wrap: wrap; }
        .panel {
            background: #16213e;
            border-radius: 12px;
            padding: 1.5rem;
            flex: 1;
            min-width: 320px;
        }
        .panel h2 { margin-bottom: 1rem; font-size: 1.5rem; }

        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.6rem;
            max-height: 65vh;
            overflow-y: auto;
        }
        .student-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
            position: relative;
        }
        .student-card .number {
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            margin-right: 0.5rem;
            flex-shrink: 0;
        }
        .student-card .name { flex: 1; }
        .student-card .status-badge {
            font-size: 0.85rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: rgba(0,0,0,0.3);
        }
        .student-card .call-btn {
            display: none;
            margin-left: 0.4rem;
            padding: 0.3rem 0.5rem;
            border-radius: 6px;
            background: #fff;
            color: var(--green);
            font-size: 1rem;
            text-decoration: none;
            flex-shrink: 0;
            z-index: 2;
        }
        .student-card.status-late .call-btn,
        .student-card.status-absent .call-btn {
            display: inline-flex;
        }

        /* 연락처 패널 */
        .contact-panel {
            background: #16213e;
            border-radius: 12px;
            padding: 1.5rem;
            width: 100%;
        }
        .contact-panel h2 { margin-bottom: 1rem; font-size: 1.5rem; }
        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 30vh;
            overflow-y: auto;
        }
        .contact-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .contact-item.late { background: var(--yellow); color: #333; }
        .contact-item.absent { background: var(--red); color: #fff; }
        .contact-item .contact-info { flex: 1; }
        .contact-item .contact-phone { font-size: 0.95rem; font-weight: normal; opacity: 0.8; }
        .contact-item a.call-link {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background: #fff;
            color: var(--blue);
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
        }
        .contact-item.absent a.call-link { color: var(--red); }
        .contact-item.late a.call-link { color: #e67e22; }
        .no-contact-msg {
            text-align: center;
            color: #aaa;
            padding: 2rem;
            font-size: 1.1rem;
        }
        .status-present { background: var(--green); color: #fff; }
        .status-late { background: var(--yellow); color: #333; }
        .status-absent { background: var(--red); color: #fff; }

        .roulette-section { text-align: center; }
        .roulette-display {
            width: 100%;
            height: 200px;
            background: #0f3460;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            margin: 1rem 0;
            border: 4px solid var(--blue);
            overflow: hidden;
            position: relative;
        }
        .roulette-name { transition: transform 0.1s; }
        .roulette-name.spinning {
            animation: slotSpin 0.08s linear infinite;
        }
        @keyframes slotSpin {
            0% { transform: translateY(-20px); opacity: 0.5; }
            50% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(20px); opacity: 0.5; }
        }
        .roulette-name.selected {
            color: var(--yellow);
            animation: pulse 0.5s ease-in-out 3;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .roulette-options {
            margin: 1rem 0;
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        .roulette-options label { font-size: 1.1rem; cursor: pointer; }
        .roulette-options input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            margin-right: 0.3rem;
            vertical-align: middle;
        }
        .picked-list {
            margin-top: 1rem;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }
        .picked-list h3 { margin-bottom: 0.5rem; color: var(--yellow); }
        .picked-item {
            padding: 0.3rem 0.6rem;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            margin-bottom: 0.3rem;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #16213e;
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 { margin-bottom: 1rem; }
        .modal textarea {
            width: 100%;
            height: 300px;
            background: #0f3460;
            color: #eee;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 1rem;
            font-size: 1rem;
            font-family: monospace;
            resize: vertical;
        }
        .modal-buttons {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .student-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            header h1 { font-size: 1.3rem; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f3460; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

        .file-input-hidden { display: none; }
        .today-date { font-size: 1.1rem; color: #aaa; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>📋 학급 출석 & 발표자 선정</h1>
            <span class="today-date" id="todayDate"></span>
        </div>
        <div class="header-buttons">
            <button class="btn btn-dark" onclick="openEditModal()">✏️ 명단 수정</button>
            <button class="btn btn-dark" onclick="document.getElementById('csvUpload').click()">📂 CSV 업로드</button>
            <input type="file" id="csvUpload" class="file-input-hidden" accept=".csv" onchange="handleCSVUpload(event)">
            <button class="btn btn-green" onclick="exportCSV()">💾 CSV 내보내기</button>
            <button class="btn btn-dark" onclick="resetAttendance()">🔄 초기화</button>
        </div>
    </header>

    <div class="container">
        <div class="panel" style="flex: 2;">
            <h2>출석 현황 <span id="attendanceSummary" style="font-size:1rem; color:#aaa;"></span></h2>
            <div class="student-grid" id="studentGrid"></div>
        </div>

        <div class="panel roulette-section">
            <h2>🎯 발표자 선정</h2>
            <div class="roulette-display">
                <span class="roulette-name" id="rouletteName">시작하세요!</span>
            </div>
            <div class="roulette-options">
                <label>
                    <input type="checkbox" id="excludePicked" checked>
                    이미 뽑힌 학생 제외
                </label>
                <label>
                    <input type="checkbox" id="onlyPresent" checked>
                    출석 학생만
                </label>
            </div>
            <button class="btn btn-blue" style="font-size:1.5rem; padding:1rem 3rem;" onclick="startRoulette()">🎲 랜덤 뽑기</button>
            <button class="btn btn-dark" style="margin-left:0.5rem;" onclick="resetPicked()">뽑기 초기화</button>
            <div class="picked-list" id="pickedList"></div>
        </div>
    </div>

    <!-- 연락처(결석/지각) 패널 -->
    <div class="container" style="padding-top:0;">
        <div class="contact-panel">
            <h2>📞 결석/지각 학생 연락 <span id="contactCount" style="font-size:1rem; color:#aaa;"></span></h2>
            <div class="contact-list" id="contactList"></div>
        </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2>학생 명단 수정</h2>
            <p style="margin-bottom:0.5rem; color:#aaa;">한 줄에 한 명씩 입력하세요. (번호,이름,전화번호)</p>
            <textarea id="editTextarea"></textarea>
            <div class="modal-buttons">
                <button class="btn btn-dark" onclick="closeEditModal()">취소</button>
                <button class="btn btn-green" onclick="saveEditModal()">저장</button>
            </div>
        </div>
    </div>

    <button class="btn btn-dark fullscreen-btn" onclick="toggleFullscreen()">⛶ 전체화면</button>

    <script>
    var DEFAULT_STUDENTS = [
        {name:"김민준", phone:"010-1234-0001"},{name:"이서연", phone:"010-1234-0002"},
        {name:"박지호", phone:"010-1234-0003"},{name:"최수아", phone:"010-1234-0004"},
        {name:"정예준", phone:"010-1234-0005"},{name:"강하은", phone:"010-1234-0006"},
        {name:"조민서", phone:"010-1234-0007"},{name:"윤도윤", phone:"010-1234-0008"},
        {name:"장서윤", phone:"010-1234-0009"},{name:"임시우", phone:"010-1234-0010"},
        {name:"한지민", phone:"010-1234-0011"},{name:"오현우", phone:"010-1234-0012"},
        {name:"신유나", phone:"010-1234-0013"},{name:"권태양", phone:"010-1234-0014"},
        {name:"황서준", phone:"010-1234-0015"},{name:"문채원", phone:"010-1234-0016"},
        {name:"배준혁", phone:"010-1234-0017"},{name:"류하린", phone:"010-1234-0018"},
        {name:"송지안", phone:"010-1234-0019"},{name:"전우진", phone:"010-1234-0020"},
        {name:"홍예린", phone:"010-1234-0021"},{name:"남도현", phone:"010-1234-0022"},
        {name:"구서영", phone:"010-1234-0023"},{name:"양시현", phone:"010-1234-0024"},
        {name:"백하준", phone:"010-1234-0025"},{name:"천수빈", phone:"010-1234-0026"},
        {name:"노윤서", phone:"010-1234-0027"},{name:"하지훈", phone:"010-1234-0028"},
        {name:"곽민아", phone:"010-1234-0029"},{name:"안재윤", phone:"010-1234-0030"}
    ];

    var students = [];
    var pickedStudents = [];
    var rouletteRunning = false;

    function init() {
        var saved = localStorage.getItem('classroom_students_v2');
        if (saved) {
            students = JSON.parse(saved);
            // 기존 데이터에 phone 필드 없으면 추가
            students.forEach(function(s, i) {
                if (!s.phone) s.phone = '010-0000-' + String(i+1).padStart(4,'0');
            });
        } else {
            students = DEFAULT_STUDENTS.map(function(item, i) {
                return { id: i+1, number: i+1, name: item.name, phone: item.phone, status: 'present', picked: false };
            });
        }
        var savedPicked = localStorage.getItem('classroom_picked');
        if (savedPicked) {
            pickedStudents = JSON.parse(savedPicked);
            pickedStudents.forEach(function(p) {
                var s = students.find(function(st) { return st.name === p.name; });
                if (s) s.picked = true;
            });
        }
        updateDate();
        render();
    }

    function updateDate() {
        var now = new Date();
        var days = ['일','월','화','수','목','금','토'];
        document.getElementById('todayDate').textContent =
            now.getFullYear() + '년 ' + (now.getMonth()+1) + '월 ' + now.getDate() + '일 (' + days[now.getDay()] + ')';
    }

    function save() {
        localStorage.setItem('classroom_students_v2', JSON.stringify(students));
        localStorage.setItem('classroom_picked', JSON.stringify(pickedStudents));
    }

    function render() {
        var grid = document.getElementById('studentGrid');
        grid.innerHTML = '';
        students.forEach(function(s, idx) {
            var card = document.createElement('div');
            var statusClass = '', statusText = '';
            if (s.status === 'present') { statusClass = 'status-present'; statusText = '출석'; }
            else if (s.status === 'late') { statusClass = 'status-late'; statusText = '지각'; }
            else { statusClass = 'status-absent'; statusText = '결석'; }
            card.className = 'student-card ' + statusClass;
            var phoneClean = s.phone ? s.phone.replace(/-/g, '') : '';
            var callBtn = (s.status === 'late' || s.status === 'absent')
                ? '<a class="call-btn" href="tel:' + phoneClean + '" onclick="event.stopPropagation();">📞</a>'
                : '';
            card.innerHTML = '<span class="number">' + s.number + '</span>' +
                '<span class="name">' + s.name + '</span>' +
                '<span class="status-badge">' + statusText + '</span>' + callBtn;
            card.onclick = function() { toggleStatus(idx); };
            grid.appendChild(card);
        });
        updateSummary();
        renderPicked();
        renderContactList();
    }

    function updateSummary() {
        var present = students.filter(function(s) { return s.status === 'present'; }).length;
        var late = students.filter(function(s) { return s.status === 'late'; }).length;
        var absent = students.filter(function(s) { return s.status === 'absent'; }).length;
        document.getElementById('attendanceSummary').textContent =
            '(출석 ' + present + ' / 지각 ' + late + ' / 결석 ' + absent + ' / 총 ' + students.length + '명)';
    }

    function toggleStatus(idx) {
        var order = ['present', 'late', 'absent'];
        var current = order.indexOf(students[idx].status);
        students[idx].status = order[(current + 1) % 3];
        save();
        render();
    }

    function resetAttendance() {
        if (!confirm('모든 학생의 출석 상태를 초기화하시겠습니까?')) return;
        students.forEach(function(s) { s.status = 'present'; s.picked = false; });
        pickedStudents = [];
        save();
        render();
    }

    function startRoulette() {
        if (rouletteRunning) return;
        var excludePicked = document.getElementById('excludePicked').checked;
        var onlyPresent = document.getElementById('onlyPresent').checked;
        var candidates = students.filter(function(s) {
            if (excludePicked && s.picked) return false;
            if (onlyPresent && s.status !== 'present') return false;
            return true;
        });
        if (candidates.length === 0) {
            document.getElementById('rouletteName').textContent = '후보 없음!';
            return;
        }
        rouletteRunning = true;
        var display = document.getElementById('rouletteName');
        display.classList.add('spinning');
        display.classList.remove('selected');
        var count = 0;
        var totalSpins = 30 + Math.floor(Math.random() * 20);
        var delay = 50;

        function spin() {
            var randomIdx = Math.floor(Math.random() * candidates.length);
            display.textContent = candidates[randomIdx].name;
            count++;
            if (count < totalSpins) {
                delay += count * 2;
                setTimeout(spin, Math.min(delay, 300));
            } else {
                var winner = candidates[Math.floor(Math.random() * candidates.length)];
                display.textContent = '🎉 ' + winner.name;
                display.classList.remove('spinning');
                display.classList.add('selected');
                rouletteRunning = false;
                winner.picked = true;
                var studentObj = students.find(function(s) { return s.id === winner.id; });
                if (studentObj) studentObj.picked = true;
                pickedStudents.push({ name: winner.name, order: pickedStudents.length + 1 });
                save();
                renderPicked();
            }
        }
        spin();
    }

    function renderPicked() {
        var list = document.getElementById('pickedList');
        if (pickedStudents.length === 0) { list.innerHTML = ''; return; }
        var html = '<h3>📌 발표 순서</h3>';
        pickedStudents.forEach(function(p, i) {
            html += '<div class="picked-item">' + (i+1) + '. ' + p.name + '</div>';
        });
        list.innerHTML = html;
    }

    function resetPicked() {
        pickedStudents = [];
        students.forEach(function(s) { s.picked = false; });
        document.getElementById('rouletteName').textContent = '시작하세요!';
        document.getElementById('rouletteName').classList.remove('selected', 'spinning');
        save();
        renderPicked();
    }

    function renderContactList() {
        var list = document.getElementById('contactList');
        var targets = students.filter(function(s) { return s.status === 'late' || s.status === 'absent'; });
        document.getElementById('contactCount').textContent = targets.length > 0 ? '(' + targets.length + '명)' : '';
        if (targets.length === 0) {
            list.innerHTML = '<div class="no-contact-msg">✅ 결석/지각 학생이 없습니다</div>';
            return;
        }
        var html = '';
        targets.forEach(function(s) {
            var cls = s.status === 'absent' ? 'absent' : 'late';
            var label = s.status === 'absent' ? '결석' : '지각';
            var phoneClean = s.phone ? s.phone.replace(/-/g, '') : '';
            html += '<div class="contact-item ' + cls + '">' +
                '<div class="contact-info">' +
                    '<span>' + s.number + '. ' + s.name + ' (' + label + ')</span><br>' +
                    '<span class="contact-phone">📱 ' + (s.phone || '번호없음') + '</span>' +
                '</div>' +
                '<a class="call-link" href="tel:' + phoneClean + '">📞 전화</a>' +
            '</div>';
        });
        list.innerHTML = html;
    }

    function handleCSVUpload(event) {
        var file = event.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(e) { parseCSVStudents(e.target.result); };
        reader.readAsText(file, 'UTF-8');
        event.target.value = '';
    }

    function parseCSVStudents(text) {
        var lines = text.split(/\r?\n/).filter(function(l) { return l.trim(); });
        var newStudents = [];
        lines.forEach(function(line, i) {
            if (i === 0 && (line.indexOf('번호') >= 0 || line.indexOf('이름') >= 0 || line.toLowerCase().indexOf('name') >= 0)) return;
            var parts = line.split(',').map(function(p) { return p.trim().replace(/"/g, ''); });
            var number, name, phone;
            if (parts.length >= 3 && !isNaN(parts[0])) {
                number = parseInt(parts[0]);
                name = parts[1];
                phone = parts[2] || '010-0000-' + String(newStudents.length+1).padStart(4,'0');
            } else if (parts.length >= 2 && !isNaN(parts[0])) {
                number = parseInt(parts[0]);
                name = parts[1];
                phone = '010-0000-' + String(newStudents.length+1).padStart(4,'0');
            } else {
                number = newStudents.length + 1;
                name = parts[0];
                phone = parts[1] || '010-0000-' + String(newStudents.length+1).padStart(4,'0');
            }
            if (name) {
                newStudents.push({ id: newStudents.length+1, number: number, name: name, phone: phone, status: 'present', picked: false });
            }
        });
        if (newStudents.length > 0) {
            students = newStudents;
            pickedStudents = [];
            save();
            render();
            alert(newStudents.length + '명의 학생을 불러왔습니다.');
        }
    }

    function exportCSV() {
        var now = new Date();
        var dateStr = now.getFullYear() + '-' +
            String(now.getMonth()+1).padStart(2,'0') + '-' +
            String(now.getDate()).padStart(2,'0');
        var csv = '\uFEFF';
        csv += '번호,이름,전화번호,출석상태,발표순서\n';
        students.forEach(function(s) {
            var statusMap = { present: '출석', late: '지각', absent: '결석' };
            var pickedOrder = -1;
            for (var i = 0; i < pickedStudents.length; i++) {
                if (pickedStudents[i].name === s.name) { pickedOrder = i; break; }
            }
            var orderStr = pickedOrder >= 0 ? String(pickedOrder + 1) : '';
            csv += s.number + ',' + s.name + ',' + (s.phone || '') + ',' + statusMap[s.status] + ',' + orderStr + '\n';
        });
        var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        var link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = '출석기록_' + dateStr + '.csv';
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function openEditModal() {
        document.getElementById('editTextarea').value =
            students.map(function(s) { return s.number + ',' + s.name + ',' + (s.phone || ''); }).join('\n');
        document.getElementById('editModal').classList.add('active');
    }

    function closeEditModal() {
        document.getElementById('editModal').classList.remove('active');
    }

    function saveEditModal() {
        parseCSVStudents(document.getElementById('editTextarea').value);
        closeEditModal();
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    init();
    </script>
</body>
</html>
